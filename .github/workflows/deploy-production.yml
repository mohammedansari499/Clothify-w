name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Run CI first
  # ──────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ──────────────────────────────────────────────
  # Manual Approval Gate
  # ──────────────────────────────────────────────
  approve:
    name: Production Approval
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approval confirmed
        run: echo "✅ Production deployment approved"

  # ──────────────────────────────────────────────
  # Deploy Backend to Render (Production)
  # ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render Production
    needs: approve
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PRODUCTION }}" \
            --fail --silent --show-error
          echo "✅ Render production deploy triggered"

  # ──────────────────────────────────────────────
  # Deploy Frontend to Vercel (Production)
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel Production
    needs: approve
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WardrobeAI/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: WardrobeAI/frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Production
        run: |
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          echo "✅ Production frontend deployed"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ──────────────────────────────────────────────
  # Post-Deploy Verification
  # ──────────────────────────────────────────────
  verify:
    name: Post-Deploy Verification
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for services to be ready
        run: sleep 45

      - name: Run verification
        run: |
          API="${{ secrets.PRODUCTION_API_URL }}"
          FRONTEND="${{ secrets.PRODUCTION_FRONTEND_URL }}"

          echo "🔍 Verifying production deployment..."

          # Backend health
          BACKEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$API/../" --max-time 15)
          if [ "$BACKEND_STATUS" -ne 200 ]; then
            echo "::error::Backend health check failed (status: $BACKEND_STATUS)"
            exit 1
          fi
          echo "✅ Backend is healthy"

          # Frontend health
          FRONTEND_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND" --max-time 15)
          if [ "$FRONTEND_STATUS" -ne 200 ]; then
            echo "::error::Frontend health check failed (status: $FRONTEND_STATUS)"
            exit 1
          fi
          echo "✅ Frontend is healthy"

          # Auth endpoint
          AUTH_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "$API/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"verify@prod.com","password":"wrong"}' --max-time 10)
          if [ "$AUTH_STATUS" -ne 401 ]; then
            echo "::error::Auth endpoint unexpected response (status: $AUTH_STATUS)"
            exit 1
          fi
          echo "✅ Auth endpoint responding correctly"

          echo ""
          echo "🎉 All production checks passed!"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Production Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Component | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend API | ${{ secrets.PRODUCTION_API_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ secrets.PRODUCTION_FRONTEND_URL }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Deployed at:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
