[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers for selective test execution
markers =
    unit: Fast isolated unit tests (no external services)
    integration: Tests requiring database or external APIs
    e2e: End-to-end tests against running services

# Default: run only unit tests
addopts = -m "unit" -v --tb=short

# Coverage settings
[coverage:run]
source = app
omit =
    */tests/*
    */venv/*
    */__pycache__/*

[coverage:report]
fail_under = 60
show_missing = true
exclude_lines =
    pragma: no cover
    if __name__ == .__main__
    pass
