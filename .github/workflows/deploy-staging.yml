name: Deploy to Staging

on:
  push:
    branches: [staging]

jobs:
  # ──────────────────────────────────────────────
  # Run CI first
  # ──────────────────────────────────────────────
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  # ──────────────────────────────────────────────
  # Deploy Backend to Render (Staging)
  # ──────────────────────────────────────────────
  deploy-backend:
    name: Deploy Backend → Render Staging
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render Deploy Hook
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_STAGING }}" \
            --fail --silent --show-error
          echo "✅ Render staging deploy triggered"

  # ──────────────────────────────────────────────
  # Deploy Frontend to Vercel (Preview)
  # ──────────────────────────────────────────────
  deploy-frontend:
    name: Deploy Frontend → Vercel Preview
    needs: ci
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: WardrobeAI/frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: WardrobeAI/frontend/package-lock.json

      - name: Install Vercel CLI
        run: npm i -g vercel@latest

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }})
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
          echo "✅ Deployed to: $URL"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ──────────────────────────────────────────────
  # Smoke Tests
  # ──────────────────────────────────────────────
  smoke-tests:
    name: Staging Smoke Tests
    needs: [deploy-backend, deploy-frontend]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for services to be ready
        run: sleep 30

      - name: Run smoke tests
        run: |
          API="${{ secrets.STAGING_API_URL }}"
          PASS=0; FAIL=0

          check() {
            local desc=$1 status=$2 expected=$3
            if [ "$status" -eq "$expected" ]; then
              echo "✅ $desc ($status)"
              ((PASS++))
            else
              echo "❌ $desc (got $status, expected $expected)"
              ((FAIL++))
            fi
          }

          # Health check
          check "API alive" \
            $(curl -s -o /dev/null -w "%{http_code}" "$API/../" --max-time 10) 200

          # Auth endpoint exists
          check "Auth endpoint" \
            $(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$API/auth/login" \
              -H "Content-Type: application/json" \
              -d '{"email":"smoke@test.com","password":"wrong"}' --max-time 10) 401

          echo ""
          echo "Results: $PASS passed, $FAIL failed"

          if [ $FAIL -gt 0 ]; then
            echo "::error::Smoke tests failed!"
            exit 1
          fi
